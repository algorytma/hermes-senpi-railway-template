# =============================================================================
# railway.toml — Railway Deploy Konfigürasyonu
# https://docs.railway.com/reference/config-as-code
# =============================================================================

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.args]
# Git ref (branch or tag) to clone hermes-agent from.
# e.g. "main", "v0.6.0", or a full commit SHA
HERMES_GIT_REF = "main"

[deploy]
# No healthcheckPath — hermes is not an HTTP server.
# Railway uses process health (is PID 1 alive?) when no path is set.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ---------------------------------------------------------------------------
# Ortam değişkeni şablonu — Railway'de elle tanımlanacak değişkenler:
#
# ZORUNLU:
#   OPENROUTER_API_KEY     — OpenRouter API anahtarı
#   SENPI_AUTH_TOKEN       — Senpi platform auth tokeni
#   ACTIVE_PROFILE         — analysis (başlangıç) | execution
#   DATA_DIR               — /data (Railway volume mount path)
#
# SAĞLAYICI (en az biri aktif olmalı):
#   NVIDIA_API_KEY         — NVIDIA NIM API
#   DASHSCOPE_API_KEY      — Alibaba DashScope (Qwen)
#   OPENCODE_API_KEY       — Özel OpenAI-compatible gateway
#   OPENCODE_BASE_URL      — Özel gateway URL
#
# OPSİYONEL:
#   BRAVE_API_KEY          — Brave Search (mcp_registry.yaml'da enable edilince)
#
# ---------------------------------------------------------------------------
# NOT: Bu dosyaya API key DEĞERLERİ yazılmaz.
# Değerler Railway dashboard'unda Variables sekmesinden tanımlanır.
# ---------------------------------------------------------------------------
