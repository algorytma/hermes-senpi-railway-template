name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Shell script linting (shellcheck)
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all shell scripts
        run: |
          echo "=== Checking bootstrap/ ==="
          shellcheck -x -S warning bootstrap/*.sh

          echo "=== Checking scripts/ ==="
          shellcheck -x -S warning scripts/*.sh

          echo "=== Checking scripts/lib/ ==="
          shellcheck -x -S warning scripts/lib/*.sh

          echo "=== Checking docker/ ==="
          shellcheck -x -S warning docker/*.sh

          echo "=== Checking migrations/ ==="
          shellcheck -x -S warning migrations/*.sh

  # ---------------------------------------------------------------------------
  # Job 2: Python lint and type check
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml flake8 pyflakes

      - name: Flake8 lint
        run: |
          flake8 scripts/*.py \
            --max-line-length=120 \
            --extend-ignore=E501 \
            --exclude=__pycache__

      - name: Python syntax check
        run: |
          python3 -m py_compile scripts/render-config.py
          echo "Syntax check passed"

  # ---------------------------------------------------------------------------
  # Job 3: Config render smoke test
  # ---------------------------------------------------------------------------
  render-smoke:
    name: Config Render Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Set up fixture data directory
        run: |
          mkdir -p tests/data/providers tests/data/mcp tests/data/risk tests/data/workspace

          cp config/providers/provider_registry.example.yaml \
             tests/data/providers/provider_registry.yaml

          cp config/providers/model_aliases.example.yaml \
             tests/data/providers/model_aliases.yaml

          cp config/mcp_registry.example.yaml \
             tests/data/mcp/mcp_registry.yaml

          cp config/risk_policy.example.yaml \
             tests/data/risk/risk_policy.yaml

          touch tests/data/workspace/AGENTS.md

      - name: Render analysis config (dry-run)
        env:
          DATA_DIR: tests/data
          OPENROUTER_API_KEY: test-key-not-real
          ACTIVE_PROFILE: analysis
        run: |
          python3 scripts/render-config.py \
            --profile analysis \
            --data-dir tests/data \
            --dry-run 2>&1 | tee /tmp/render-analysis.log

          echo "--- Checking output ---"
          # api_key values must NOT appear in rendered output
          if grep -q "test-key-not-real" /tmp/render-analysis.log; then
            echo "SECURITY FAIL: API key value found in rendered output!"
            exit 1
          fi
          echo "Security check passed: no API key value in output"

      - name: Render execution config (dry-run)
        env:
          DATA_DIR: tests/data
          OPENROUTER_API_KEY: test-key-not-real
          ACTIVE_PROFILE: execution
        run: |
          python3 scripts/render-config.py \
            --profile execution \
            --data-dir tests/data \
            --dry-run 2>&1 | tee /tmp/render-execution.log

          echo "Security check: no API key value in execution output"
          if grep -q "test-key-not-real" /tmp/render-execution.log; then
            echo "SECURITY FAIL: API key value found in rendered output!"
            exit 1
          fi

      - name: Verify Senpi MCP excluded from analysis profile
        env:
          DATA_DIR: tests/data
          OPENROUTER_API_KEY: test-key
          SENPI_AUTH_TOKEN: senpi-test-token
        run: |
          python3 scripts/render-config.py \
            --profile analysis \
            --data-dir tests/data \
            --dry-run 2>&1 | tee /tmp/senpi-check.log

          # Senpi MCP must be blocked in analysis profile
          if grep -q "senpi_mcp_servers\|senpi:" /tmp/senpi-check.log; then
            # This is OK in the log (it's a note about it being blocked)
            # What we need to check is that it's not in the rendered config as an active server
            python3 -c "
import yaml, sys
with open('/tmp/senpi-check.log') as f:
    content = f.read()
if 'senpi' in content.lower() and 'BLOCKED' not in content:
    print('WARNING: Senpi may be in analysis config — check manually')
print('Senpi MCP check complete')
"
          fi
          echo "Senpi guard check passed"

      - name: Validate canonical files
        env:
          DATA_DIR: tests/data
          OPENROUTER_API_KEY: test-key
        run: |
          python3 scripts/render-config.py \
            --validate-only \
            --data-dir tests/data
          echo "Canonical file validation passed"

  # ---------------------------------------------------------------------------
  # Job 4: Risk policy validation tests
  # ---------------------------------------------------------------------------
  risk-validation:
    name: Risk Policy Validation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install pyyaml

      - name: Test — valid risk policy passes
        env:
          DATA_DIR: tests/fixtures/risk_valid
        run: |
          mkdir -p tests/fixtures/risk_valid/risk
          cat > tests/fixtures/risk_valid/risk/risk_policy.yaml << 'EOF'
          version: "1"
          mode: copilot
          trading:
            max_leverage: 3
            max_position_size_usd: 300
            max_daily_loss_usd: 100
          symbols:
            allowlist: ["BTC", "ETH"]
            default_action: deny
          execution:
            dry_run_default: true
            allow_open_new_position: false
          EOF
          bash bootstrap/validate-risk.sh && echo "PASS: valid policy accepted"

      - name: Test — missing default_action fails
        env:
          DATA_DIR: tests/fixtures/risk_missing_action
        run: |
          mkdir -p tests/fixtures/risk_missing_action/risk
          cat > tests/fixtures/risk_missing_action/risk/risk_policy.yaml << 'EOF'
          version: "1"
          mode: copilot
          trading:
            max_leverage: 3
            max_position_size_usd: 300
            max_daily_loss_usd: 100
          symbols:
            allowlist: ["BTC"]
            default_action: allow
          execution:
            dry_run_default: true
            allow_open_new_position: false
          EOF
          if bash bootstrap/validate-risk.sh 2>/dev/null; then
            echo "FAIL: default_action=allow should have been rejected"
            exit 1
          else
            echo "PASS: default_action=allow correctly rejected"
          fi

      - name: Test — missing max_leverage fails
        env:
          DATA_DIR: tests/fixtures/risk_no_leverage
        run: |
          mkdir -p tests/fixtures/risk_no_leverage/risk
          cat > tests/fixtures/risk_no_leverage/risk/risk_policy.yaml << 'EOF'
          version: "1"
          mode: copilot
          trading:
            max_position_size_usd: 300
            max_daily_loss_usd: 100
          symbols:
            allowlist: ["BTC"]
            default_action: deny
          execution:
            dry_run_default: true
            allow_open_new_position: false
          EOF
          if bash bootstrap/validate-risk.sh 2>/dev/null; then
            echo "FAIL: missing max_leverage should have been rejected"
            exit 1
          else
            echo "PASS: missing max_leverage correctly rejected"
          fi

      - name: Test — leverage > 10 fails
        env:
          DATA_DIR: tests/fixtures/risk_high_leverage
        run: |
          mkdir -p tests/fixtures/risk_high_leverage/risk
          cat > tests/fixtures/risk_high_leverage/risk/risk_policy.yaml << 'EOF'
          version: "1"
          mode: copilot
          trading:
            max_leverage: 11
            max_position_size_usd: 300
            max_daily_loss_usd: 100
          symbols:
            allowlist: ["BTC"]
            default_action: deny
          execution:
            dry_run_default: true
            allow_open_new_position: false
          EOF
          if bash bootstrap/validate-risk.sh 2>/dev/null; then
            echo "FAIL: leverage > 10 should have been rejected"
            exit 1
          else
            echo "PASS: leverage > 10 correctly rejected"
          fi

  # ---------------------------------------------------------------------------
  # Job 5: Backup / restore round-trip test
  # ---------------------------------------------------------------------------
  backup-restore:
    name: Backup Restore Round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install pyyaml

      - name: Set up test /data volume
        run: |
          mkdir -p /tmp/test-data/{providers,mcp,risk,workspace,skills/manifests,logs/audit}
          cp config/providers/provider_registry.example.yaml \
             /tmp/test-data/providers/provider_registry.yaml
          cp config/mcp_registry.example.yaml \
             /tmp/test-data/mcp/mcp_registry.yaml
          cp config/risk_policy.example.yaml \
             /tmp/test-data/risk/risk_policy.yaml
          echo "Test workspace" > /tmp/test-data/workspace/AGENTS.md
          echo "Test audit log" > /tmp/test-data/logs/audit/test.log

      - name: Create backup
        env:
          DATA_DIR: /tmp/test-data
          ACTIVE_PROFILE: analysis
          HERMES_VERSION: v0.6.0-test
        run: |
          mkdir -p /tmp/test-data/backups/exports
          bash scripts/backup-export.sh --output /tmp/test-backup.tar.gz
          test -f /tmp/test-backup.tar.gz && echo "PASS: backup created"
          tar -tzf /tmp/test-backup.tar.gz | head -20

      - name: Restore backup
        env:
          DATA_DIR: /tmp/test-data-restore
        run: |
          mkdir -p /tmp/test-data-restore
          bash scripts/backup-restore.sh /tmp/test-backup.tar.gz --yes
          echo "PASS: restore completed without error"

      - name: Verify restored files
        run: |
          test -f /tmp/test-data-restore/providers/provider_registry.yaml && \
            echo "PASS: provider_registry.yaml restored"
          test -f /tmp/test-data-restore/risk/risk_policy.yaml && \
            echo "PASS: risk_policy.yaml restored"
          test -f /tmp/test-data-restore/workspace/AGENTS.md && \
            echo "PASS: workspace AGENTS.md restored"

          echo "Checking that generated configs were NOT restored..."
          if find /tmp/test-data-restore -name "config.generated.yaml" | grep -q .; then
            echo "FAIL: generated config should not be in restore"
            exit 1
          fi
          echo "PASS: no generated configs in restore"
